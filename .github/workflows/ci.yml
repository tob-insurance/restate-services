name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "turbo.json"
      - "bun.lock"
      - "tsconfig*.json"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run check
      - run: bun run build
      - run: bun run test
