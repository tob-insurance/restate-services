name: Deploy Restate Lambda

on:
  workflow_call:
    inputs:
      app-name:
        description: "App directory name (e.g., finance, soa-finance)"
        type: string
        required: true
      lambda-name:
        description: "AWS Lambda function name"
        type: string
        required: true
      environment:
        description: "Deployment environment"
        type: string
        default: "prod"
env:
  AWS_REGION: ap-southeast-3

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Fetch secrets from Infisical
        uses: Infisical/secrets-action@77ab1f4ccd183a543cb5b42435fbd181189f4995 # v1.0.16
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_MACHINE_IDENTITY_ID }}
          domain: "https://infisical.tob-insurance.com"
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ inputs.environment }}
          secret-path: "/${{ inputs.app-name }}"
          export-type: "file"
          # Note: path must start with / (Infisical action uses string concatenation, not path.join)
          file-output-path: "/apps/${{ inputs.app-name }}/.env"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Turborepo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .turbo
            apps/*/.turbo
            packages/*/.turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint check
        run: bun run check

      - name: Build packages
        run: bun run build

      - name: Build Lambda bundle
        run: bun run --filter @restate-tob/${{ inputs.app-name }} bundle:lambda

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda Function
        id: deploy
        run: |
          aws lambda update-function-code \
            --function-name ${{ inputs.lambda-name }} \
            --zip-file fileb://apps/${{ inputs.app-name }}/dist-lambda/lambda.zip

          aws lambda wait function-updated --function-name ${{ inputs.lambda-name }}

          # Convert .env to JSON using Node.js (handles special chars safely)
          node -e "
            const fs = require('fs');
            const path = require('path');
            const envPath = path.join('${{ github.workspace }}', 'apps', '${{ inputs.app-name }}', '.env');
            const content = fs.readFileSync(envPath, 'utf8');
            const vars = {};
            content.split('\n').forEach(line => {
              line = line.trim();
              if (!line || line.startsWith('#')) return;
              const eqIdx = line.indexOf('=');
              if (eqIdx === -1) return;
              const key = line.slice(0, eqIdx).trim();
              let value = line.slice(eqIdx + 1).trim();
              if ((value.startsWith('"') && value.endsWith('"')) ||
                  (value.startsWith("'") && value.endsWith("'"))) {
                value = value.slice(1, -1);
              }
              vars[key] = value;
            });
            fs.writeFileSync('/tmp/env.json', JSON.stringify({ Variables: vars }));
          "

          aws lambda update-function-configuration \
            --function-name ${{ inputs.lambda-name }} \
            --layers '[]' \
            --environment file:///tmp/env.json

      - name: Tag Lambda function
        run: |
          aws lambda tag-resource \
            --resource "$(aws lambda get-function --function-name ${{ inputs.lambda-name }} --query 'Configuration.FunctionArn' --output text)" \
            --tags "ManagedBy=github-actions"

      - name: Register with Restate
        env:
          RESTATE_ADMIN_URL: ${{ secrets.RESTATE_ADMIN_URL }}
          RESTATE_BASIC_AUTH: ${{ secrets.RESTATE_BASIC_AUTH }}
        run: |
          FUNCTION_ARN=$(aws lambda get-function --function-name ${{ inputs.lambda-name }} --query 'Configuration.FunctionArn' --output text)

          aws lambda wait function-updated --function-name ${{ inputs.lambda-name }}

          VERSION=$(aws lambda publish-version --function-name ${{ inputs.lambda-name }} --query 'Version' --output text)
          VERSIONED_ARN="${FUNCTION_ARN}:${VERSION}"
          echo "Registering Lambda ARN: $VERSIONED_ARN"

          # Register with force to overwrite if exists
          RESPONSE=$(curl -s -w "\n%{http_code}" -u "$RESTATE_BASIC_AUTH" -X POST "$RESTATE_ADMIN_URL/deployments" \
            -H "Content-Type: application/json" \
            -d "{\"arn\": \"$VERSIONED_ARN\", \"assume_role_arn\": \"${{ secrets.AWS_INVOKE_ROLE_ARN }}\", \"force\": true}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "Response: $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Error: HTTP $HTTP_CODE"
            exit 1
          fi
