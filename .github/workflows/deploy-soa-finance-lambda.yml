name: Deploy SOA Finance Lambda

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - dev
          - staging
          - prod
  push:
    branches: [main]
    paths:
      - "apps/soa-finance/**"
      - "packages/postgres/**"
      - ".github/workflows/deploy-restate-lambda.yml"

jobs:
  deploy:
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/deploy-restate-lambda.yml
    with:
      app-name: "soa-finance"
      lambda-name: "soa-finance"
      environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'prod' }}
      oracle-layer-name: ""  # soa-finance doesn't use Oracle; clears any existing layers
    secrets: inherit
