<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    .wrapper {
      background-color: #f9f9f9;
      text-align: center;
      font-family: Calibri, sans-serif;
      height: 100vh;
    }
    .card {
      background-color: #ffffff;
      border: 1px solid #dddddd;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .card-body {
      padding: 24px;
      font-family: Calibri, sans-serif;
      font-size: 11pt;
      color: #000000;
      text-align: left;
    }
    .email-link {
      color: #0563C1;
    }
    .warning {
      color: #ff0000;
      font-weight: bold;
    }
    .bank-table td {
      padding-right: 20px;
      vertical-align: top;
      white-space: nowrap;
    }
    .signature-img {
      width: 100px;
      height: auto;
    }
    hr {
      border: 0;
      border-top: 1px solid #cccccc;
      margin: 24px 0;
    }

    /* Responsive: shrink padding and font size on mobile email clients */
    @media only screen and (max-width: 480px) {
      .card {
        width: 100% !important;
        border-radius: 0 !important;
      }
      .card-body {
        padding: 16px !important;
        font-size: 10pt !important;
      }
    }
  </style>
  <title>{% block title %}PT. ASURANSI TOTAL BERSAMA{% endblock %}</title>
</head>
<body style="margin:0;padding:0">
  <!--
    Hidden preview text for email client inbox snippets.
    MUST be the first element inside <body> for Gmail/Outlook preview.
  -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    {% block preview %}PT. ASURANSI TOTAL BERSAMA{% endblock %}
  </div>
  <table
    width="100%"
    height="100%"
    cellpadding="0"
    cellspacing="0"
    border="0"
    class="wrapper"
  >
    <tr>
      <td
        align="center"
        valign="top"
        style="padding-top:100px;padding-bottom:100px"
      >
        <table
          width="80%"
          cellpadding="0"
          cellspacing="0"
          border="0"
          class="card"
        >
          <tr>
            <td class="card-body">
              <div lang="en-ID" link="#0563C1" vlink="#954F72" style="word-wrap:break-word">
                {% block content %}{% endblock %}
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
